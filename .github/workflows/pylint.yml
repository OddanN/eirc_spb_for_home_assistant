name: Pylint

on:
  pull_request:
  workflow_dispatch:

jobs:
  pylint:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install pylint
        run: python -m pip install --upgrade pip pylint

      - name: Run pylint
        run: |
          pylint --rcfile=.pylintrc custom_components/eirc_spb_for_home_assistant | tee pylint-report.txt

      - name: Upload pylint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pylint-report
          path: pylint-report.txt
